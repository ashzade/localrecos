# Copy this file to .github/workflows/uptocode.yml in your project.
#
# Runs the UpToCode Building Inspection on every push and pull request.
# Results appear in the GitHub Actions summary tab (always) and as a
# PR comment (when a pull request is open).
#
# Adversarial tests run nightly at 2am UTC and can be triggered manually
# from the Actions tab at any time.

name: UpToCode Inspection

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * *'   # nightly at 2am UTC
  workflow_dispatch:        # manual trigger from Actions tab

jobs:
  inspect:
    name: Building Inspection
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write

    steps:
      - uses: actions/checkout@v4

      - uses: ashzade/UpToCode/.github/actions/inspect@main
        with:
          project_root: ${{ github.workspace }}

  generate-tests:
    name: Adversarial Tests
    runs-on: ubuntu-latest
    # Only run on schedule or manual trigger, not every push/PR
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install UpToCode
        run: |
          git clone --depth 1 https://github.com/ashzade/UpToCode "$RUNNER_TEMP/uptocode"
          cd "$RUNNER_TEMP/uptocode" && npm ci --silent

      - name: Generate adversarial tests
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd "$RUNNER_TEMP/uptocode"
          node node_modules/.bin/ts-node --transpile-only ci/generate-tests.ts

      - name: Post to Actions summary
        if: always()
        run: |
          REPORT="${{ github.workspace }}/adversarial-tests.md"
          if [ -f "$REPORT" ]; then cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"; fi

      - name: Post as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = `${{ github.workspace }}/adversarial-tests.md`;
            if (!fs.existsSync(reportPath)) return;
            const body = fs.readFileSync(reportPath, 'utf8');

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main',
              per_page: 1,
              sort: 'updated',
              direction: 'desc',
            });
            if (prs.length === 0) return;
            const prNumber = prs[0].number;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c =>
              c.user?.login === 'github-actions[bot]' &&
              c.body?.includes('Adversarial Test Suite')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Upload adversarial-tests.md
        uses: actions/upload-artifact@v4
        with:
          name: adversarial-tests
          path: ${{ github.workspace }}/adversarial-tests.md
          if-no-files-found: ignore
